<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password | THIS IS MUSIC</title>
  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0d1d34;
      --panel:rgba(10,23,42,.82);
      --panelSoft:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --text:#ecf3ff;
      --muted:#98a7c2;
      --accent:#7c5cff;
      --accent2:#1fd1ff;
      --danger:#ff6b81;
      --success:#4ade80;
      --shadow:0 22px 60px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.20), transparent 28%),
        radial-gradient(circle at top right, rgba(31,209,255,.18), transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .shell{
      width:100%;
      max-width:460px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px 26px 24px;
      backdrop-filter:blur(14px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brandBadge{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-size:24px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 10px 30px rgba(124,92,255,.35);
    }

    .eyebrow{
      margin:0;
      color:var(--muted);
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:4px 0 10px;
      font-size:30px;
      line-height:1.1;
    }

    .subtext{
      margin:0 0 22px;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .formGroup{
      margin-bottom:16px;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin-bottom:8px;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:15px;
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    input::placeholder{
      color:#8ea0c1;
    }

    input:focus{
      border-color:rgba(124,92,255,.9);
      box-shadow:0 0 0 4px rgba(124,92,255,.16);
      background:rgba(255,255,255,.07);
    }

    .button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      color:white;
      cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 14px 32px rgba(124,92,255,.30);
      transition:transform .15s ease, opacity .15s ease;
    }

    .button:hover{
      transform:translateY(-1px);
    }

    .button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .message{
      margin-top:16px;
      padding:13px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.45;
      display:none;
      border:1px solid transparent;
    }

    .message.error{
      display:block;
      color:#ffd6dc;
      background:rgba(255,107,129,.12);
      border-color:rgba(255,107,129,.28);
    }

    .message.success{
      display:block;
      color:#d8ffe8;
      background:rgba(74,222,128,.12);
      border-color:rgba(74,222,128,.28);
    }

    .links{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .links a{
      color:#cdd9ff;
      text-decoration:none;
      font-size:14px;
    }

    .links a:hover{
      text-decoration:underline;
    }

    .passwordHint{
      margin:10px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    @media (max-width:520px){
      .card{
        padding:24px 18px 20px;
      }

      h1{
        font-size:26px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="brand">
        <div class="brandBadge">🎵</div>
        <div>
          <p class="eyebrow">THIS IS MUSIC</p>
          <h1>Reset your password</h1>
        </div>
      </div>

      <p class="subtext">
        Enter your username and choose a new password to get back into your account.
      </p>

      <form id="forgotPasswordForm">
        <div class="formGroup">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="formGroup">
          <label for="newPassword">New Password</label>
          <input
            id="newPassword"
            name="newPassword"
            type="password"
            placeholder="Enter a new password"
            required
          >
          <p class="passwordHint">
            Must be at least 8 characters and include 1 number and 1 special character.
          </p>
        </div>

        <div class="formGroup">
          <label for="confirmPassword">Confirm New Password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="Confirm your new password"
            required
          >
        </div>

        <button id="submitBtn" class="button" type="submit">Update Password</button>
        <div id="messageBox" class="message"></div>
      </form>

      <div class="links">
        <a href="/login">Back to Login</a>
        <a href="/">Back to Landing Page</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("forgotPasswordForm");
    const messageBox = document.getElementById("messageBox");
    const submitBtn = document.getElementById("submitBtn");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = "message " + type;
      messageBox.style.display = "block";
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message";
      messageBox.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const username = document.getElementById("username").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!username || !newPassword || !confirmPassword) {
        showMessage("All fields are required.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Updating...";

      try {
        const response = await fetch("/api/forgot-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            new_password: newPassword,
            confirm_password: confirmPassword
          })
        });

        const data = await response.json();

        if (data.status === "success") {
          showMessage(data.message || "Password updated successfully.", "success");
          form.reset();

          setTimeout(() => {
            window.location.href = "/login";
          }, 1500);
        } else {
          showMessage(data.message || "Unable to reset password.", "error");
        }
      } catch (error) {
        showMessage("Password reset service is unavailable right now.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Update Password";
      }
    });
  </script>
</body>
</html>
